<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revive EA 収益シミュレーター</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com" data-cfasync="false"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" data-cfasync="false"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" data-cfasync="false"></script>

  <!-- Babel for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-cfasync="false"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Icons (Inline SVGs to avoid external dependencies) ---
    const Calculator = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>);
    const TrendingUp = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>);
    const Users = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>);
    const RefreshCw = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>);
    const Award = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>);
    const Info = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);
    const AlertCircle = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);

    // --- Main App Component ---
    function App() {
      // State
      const [deposit, setDeposit] = useState(100000);
      const [bonusRate, setBonusRate] = useState(100);
      const [accounts, setAccounts] = useState(1);
      const [cycles, setCycles] = useState(2);
      const [fee, setFee] = useState(30000);
      const [referrals, setReferrals] = useState(0);

      // Calculations
      const bonusAmount = deposit * (bonusRate / 100);
      const profitPerCycle = Math.max(0, bonusAmount - fee);
      const monthlyTradingProfit = profitPerCycle * cycles * accounts;
      const referralBonus = referrals * 60000;
      const totalMonthlyProfit = monthlyTradingProfit + referralBonus;
      
      const targetProfit = 1000000;
      const progressPercent = Math.min(100, (totalMonthlyProfit / targetProfit) * 100);

      // Formatting
      const formatCurrency = (amount) => {
        return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY', maximumFractionDigits: 0 }).format(amount);
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-4xl mx-auto space-y-6">
            
            {/* Header */}
            <header className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-6 text-white shadow-lg flex items-center gap-4">
              <div className="p-3 bg-white/20 rounded-xl">
                <Calculator className="w-8 h-8" />
              </div>
              <div>
                <h1 className="text-2xl font-bold">Revive EA 収益シミュレーター</h1>
                <p className="text-blue-100 text-sm mt-1">両建てボーナス運用の月間利益と100万円へのロードマップを計算します</p>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              
              {/* Left Column: Inputs */}
              <div className="lg:col-span-5 space-y-6">
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                  <h2 className="text-lg font-bold flex items-center gap-2 mb-6 border-b pb-3">
                    <Calculator className="w-5 h-5 text-blue-600" />
                    運用パラメータ設定
                  </h2>

                  <div className="space-y-5">
                    {/* Deposit */}
                    <div>
                      <label className="flex justify-between text-sm font-medium text-slate-700 mb-2">
                        <span>1口座あたりの入金額</span>
                        <span className="text-blue-600 font-bold">{formatCurrency(deposit)}</span>
                      </label>
                      <input 
                        type="range" min="50000" max="500000" step="10000" 
                        value={deposit} onChange={(e) => setDeposit(Number(e.target.value))}
                        className="w-full accent-blue-600"
                      />
                      <p className="text-xs text-slate-500 mt-1">推奨: 10万円(初回) / 30万円(2回目以降)</p>
                    </div>

                    {/* Bonus Rate */}
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-2">ボーナス付与率</label>
                      <div className="flex gap-2">
                        {[20, 50, 100].map(rate => (
                          <button
                            key={rate}
                            onClick={() => setBonusRate(rate)}
                            className={`flex-1 py-2 rounded-lg text-sm font-bold transition-colors ${
                              bonusRate === rate 
                                ? 'bg-blue-600 text-white shadow-md' 
                                : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                            }`}
                          >
                            {rate}%
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Accounts */}
                    <div>
                      <label className="flex justify-between text-sm font-medium text-slate-700 mb-2">
                        <span>運用アカウント数</span>
                        <span className="text-blue-600 font-bold">{accounts} アカウント</span>
                      </label>
                      <input 
                        type="range" min="1" max="10" step="1" 
                        value={accounts} onChange={(e) => setAccounts(Number(e.target.value))}
                        className="w-full accent-blue-600"
                      />
                    </div>

                    {/* Cycles */}
                    <div>
                      <label className="flex justify-between text-sm font-medium text-slate-700 mb-2">
                        <span>月間回転数 (1アカウントあたり)</span>
                        <span className="text-blue-600 font-bold">{cycles} 回転</span>
                      </label>
                      <input 
                        type="range" min="1" max="5" step="1" 
                        value={cycles} onChange={(e) => setCycles(Number(e.target.value))}
                        className="w-full accent-blue-600"
                      />
                    </div>

                    {/* Referrals */}
                    <div className="pt-4 border-t border-slate-100">
                      <label className="flex justify-between text-sm font-medium text-slate-700 mb-2">
                        <span className="flex items-center gap-1"><Users className="w-4 h-4" /> 月間紹介人数</span>
                        <span className="text-green-600 font-bold">{referrals} 人</span>
                      </label>
                      <input 
                        type="range" min="0" max="20" step="1" 
                        value={referrals} onChange={(e) => setReferrals(Number(e.target.value))}
                        className="w-full accent-green-600"
                      />
                      <p className="text-xs text-slate-500 mt-1">紹介報酬: 1人あたり60,000円</p>
                    </div>
                  </div>
                </div>

                {/* Hint Box */}
                <div className="bg-blue-50 rounded-2xl p-5 border border-blue-100 flex gap-3 text-sm text-blue-800">
                  <Info className="w-5 h-5 flex-shrink-0 mt-0.5 text-blue-600" />
                  <div>
                    <p className="font-bold mb-1">利益の計算ロジック</p>
                    <p>両建てにより資金は減らず、<strong>「獲得したボーナス額」から「取引手数料（約3万円）」を引いた額</strong>が、実質的な1サイクルあたりの利益となります。</p>
                  </div>
                </div>
              </div>

              {/* Right Column: Results & Roadmap */}
              <div className="lg:col-span-7 space-y-6">
                
                {/* Main Result Card */}
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 overflow-hidden relative">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full -mr-16 -mt-16 opacity-50"></div>
                  
                  <h2 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2 relative z-10">予想月間トータル利益</h2>
                  <div className="flex items-end gap-2 mb-6 relative z-10">
                    <span className="text-5xl font-black text-slate-800 tracking-tight">{formatCurrency(totalMonthlyProfit)}</span>
                  </div>

                  {/* Progress to 1M */}
                  <div className="space-y-2 relative z-10">
                    <div className="flex justify-between text-sm font-medium">
                      <span className="text-slate-600">月間100万円への進捗</span>
                      <span className="text-blue-600">{progressPercent.toFixed(1)}%</span>
                    </div>
                    <div className="h-4 bg-slate-100 rounded-full overflow-hidden">
                      <div 
                        className={`h-full rounded-full transition-all duration-500 ${progressPercent >= 100 ? 'bg-gradient-to-r from-green-400 to-emerald-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500'}`}
                        style={{ width: `${progressPercent}%` }}
                      ></div>
                    </div>
                  </div>

                  {/* Breakdown */}
                  <div className="mt-8 grid grid-cols-2 gap-4 relative z-10">
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                      <div className="text-xs text-slate-500 mb-1 flex items-center gap-1"><RefreshCw className="w-3 h-3" /> 運用利益</div>
                      <div className="text-xl font-bold text-slate-800">{formatCurrency(monthlyTradingProfit)}</div>
                      <div className="text-xs text-slate-400 mt-1">1回転 {formatCurrency(profitPerCycle)}</div>
                    </div>
                    <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                      <div className="text-xs text-green-600 mb-1 flex items-center gap-1"><Award className="w-3 h-3" /> 紹介報酬</div>
                      <div className="text-xl font-bold text-green-700">{formatCurrency(referralBonus)}</div>
                      <div className="text-xs text-green-500 mt-1">{referrals}人 × 6万円</div>
                    </div>
                  </div>
                </div>

                {/* Roadmap Section */}
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                  <h2 className="text-lg font-bold flex items-center gap-2 mb-6">
                    <TrendingUp className="w-5 h-5 text-indigo-600" />
                    月間100万円へのロードマップ
                  </h2>

                  <div className="space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-200 before:to-transparent">
                    
                    {/* Step 1 */}
                    <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                      <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-blue-100 text-blue-600 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2">
                        1
                      </div>
                      <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border border-slate-100 bg-slate-50 shadow-sm">
                        <div className="flex items-center justify-between space-x-2 mb-1">
                          <div className="font-bold text-slate-800">初期ボーナスを狩る</div>
                        </div>
                        <div className="text-sm text-slate-600">初回100%ボーナスを活用し、1アカウントで月間20〜30万円を確実に確定させる。（Day0〜Day5のサイクル順守）</div>
                      </div>
                    </div>

                    {/* Step 2 */}
                    <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                      <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 ${accounts >= 3 ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-400'}`}>
                        2
                      </div>
                      <div className={`w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border shadow-sm ${accounts >= 3 ? 'border-blue-100 bg-blue-50/30' : 'border-slate-100 bg-white'}`}>
                        <div className="flex items-center justify-between space-x-2 mb-1">
                          <div className={`font-bold ${accounts >= 3 ? 'text-blue-800' : 'text-slate-800'}`}>アカウントの横展開</div>
                          {accounts < 3 && <span className="text-xs font-semibold text-rose-500 bg-rose-50 px-2 py-1 rounded-full">必須</span>}
                        </div>
                        <div className="text-sm text-slate-600">VPSを活用し、家族名義などを含め<span className="font-bold text-slate-800">3〜5アカウント</span>を並行稼働。ボーナス率が下がった業者は入金額を30万円に引き上げ利益幅を維持。</div>
                      </div>
                    </div>

                    {/* Step 3 */}
                    <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                      <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 ${totalMonthlyProfit >= 1000000 ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                        3
                      </div>
                      <div className={`w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border shadow-sm ${totalMonthlyProfit >= 1000000 ? 'border-emerald-200 bg-emerald-50' : 'border-slate-100 bg-white'}`}>
                        <div className="flex items-center justify-between space-x-2 mb-1">
                          <div className={`font-bold ${totalMonthlyProfit >= 1000000 ? 'text-emerald-800' : 'text-slate-800'}`}>100万円到達・紹介報酬</div>
                        </div>
                        <div className="text-sm text-slate-600">複数アカウントでの自己運用益（約80万円）に、自身の実績をベースにした紹介報酬（3名紹介=18万円等）を加え、月間100万円を突破。</div>
                      </div>
                    </div>

                  </div>

                  {/* Warning/Advice */}
                  {totalMonthlyProfit < 1000000 && (
                    <div className="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-xl flex gap-3 text-sm text-amber-800">
                      <AlertCircle className="w-5 h-5 flex-shrink-0 mt-0.5 text-amber-600" />
                      <div>
                        <span className="font-bold">目標到達へのアドバイス: </span>
                        {accounts < 4 
                          ? "100万円達成には、1アカウントの上限(約30万)を考慮し、アカウント数を増やすことが最も近道です。スライダーでアカウント数を増やしてみてください。"
                          : "アカウント数は十分です。あとはボーナス率の高い業者をローテーションするか、紹介制度を組み合わせることで100万円に到達します。"}
                      </div>
                    </div>
                  )}
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
